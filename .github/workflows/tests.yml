name: Laravel Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: sqlite
          coverage: none

      - name: Prepare env file
        working-directory: APILaravel
        run: |
          touch .env
          ls -la
          ls -la .env

      - name: Install dependencies
        run: |
          cd APILaravel
          composer install --no-interaction --prefer-dist

      - name: Run tests
        run: |
          cd APILaravel
          composer test