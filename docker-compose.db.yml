# Docker Compose pour le développement LOCAL
# Lance uniquement PostgreSQL et Redis
# L'API Rails tourne en local pour le hot-reload

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuan2_development
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Port 5433 pour éviter conflit avec PostgreSQL local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"  # Exposé pour accès local
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
