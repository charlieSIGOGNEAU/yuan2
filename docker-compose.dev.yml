services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=yuan2_development
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - yuan2_network
    # Port non exposé (utilisé seulement par l'API via le réseau Docker)
    # ports:
    #   - "5432:5432"  # Décommenter si vous voulez accéder depuis l'extérieur
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - yuan2_network
    # Port non exposé (utilisé seulement par l'API via le réseau Docker)
    # ports:
    #   - "6379:6379"  # Décommenter si vous voulez accéder depuis l'extérieur

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev.alternative  # Utilise la version qui évite bundle install
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development  # ⚠️ IMPORTANT : development au lieu de production
      - REDIS_URL=redis://redis:6379/1
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - DATABASE_HOST=postgres
      - DATABASE_USERNAME=${DATABASE_USERNAME:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
    volumes:
      # 🔥 VOLUMES POUR LE DÉVELOPPEMENT : Le code est monté, pas copié
      - ./api:/rails:cached  # Tout le code source est synchronisé
      - api_storage_dev:/rails/storage
      - api_log_dev:/rails/log
      - api_tmp_dev:/rails/tmp
      - api_node_modules:/rails/node_modules  # Évite de réinstaller node_modules à chaque fois
      - bundle_cache:/usr/local/bundle  # Cache des gems
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - yuan2_network
    # Override la commande pour le développement
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0"

volumes:
  postgres_dev_data:
  redis_dev_data:
  api_storage_dev:
  api_log_dev:
  api_tmp_dev:
  api_node_modules:
  bundle_cache:

networks:
  yuan2_network:
    driver: bridge

